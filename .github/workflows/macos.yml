name: macOS Remote Desktop
on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Select macOS Runner Specification'
        required: true
        default: 'macos-15'
        type: choice
        options:
          - 'macos-15'
          - 'macos-15-large'
          - 'macos-15-xlarge'
          - 'macos-latest'
          - 'macos-latest-large'
          - 'macos-14'
          - 'macos-14-large'
          - 'macos-14-xlarge'
          - 'macos-26'
          - 'macos-26-xlarge'
          - 'macos-26-intel'
          - 'macos-26-large'

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build macOS Remote Desktop (${{ github.event.inputs.runner }})
    runs-on: ${{ github.event.inputs.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup macOS Remote Environment
        env:
          TS_KEY: ${{ secrets.TS_KEY }}
          VNC_USER_PASSWORD: ${{ secrets.VNC_USER_PASSWORD }}
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: bash scripts/setup_macos.sh "$VNC_USER_PASSWORD" "$VNC_PASSWORD" "$TS_KEY"
